<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecionando...</title>
  <link href="style.css" rel="stylesheet"/>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="js/version.js" defer></script>

  <script defer>
    const USER_TYPE_STORAGE_KEY = "tipo_usuario_escolhido";

    function redirectByType(tipo) {
      if (tipo === "motorista") {
        window.location.href = "app.html";
      } else if (tipo === "passageiro") {
        window.location.href = "passageiro.html";
      } else {
        throw new Error("Tipo de usuário inválido.");
      }
    }

    firebase.auth().onAuthStateChanged(async user => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const localType = localStorage.getItem(USER_TYPE_STORAGE_KEY);
      const sessionType = sessionStorage.getItem(USER_TYPE_STORAGE_KEY);
      const fallbackTipo = localType || sessionType;

      try {
        const db = firebase.firestore();
        const doc = await db.collection("usuarios").doc(user.uid).get();

        if (doc.exists) {
          const tipo = doc.data().tipo;
          localStorage.setItem(USER_TYPE_STORAGE_KEY, tipo);
          redirectByType(tipo);
        } else {
          if (fallbackTipo) {
            // Tenta persistir perfil para não depender apenas do fallback.
            try {
              await db.collection("usuarios").doc(user.uid).set({
                nome: user.displayName,
                email: user.email,
                tipo: fallbackTipo
              }, { merge: true });
            } catch (persistError) {
              console.error("Falha ao persistir perfil em fallback:", persistError);
            }

            redirectByType(fallbackTipo);
          } else {
            // Se doc não existe e não há fallback, pode ser race condition; tente novamente.
            setTimeout(() => window.location.reload(), 1000);
          }
        }
      } catch (error) {
        console.error("Erro ao carregar tipo:", error);

        if (fallbackTipo) {
          redirectByType(fallbackTipo);
          return;
        }

        alert("⚠️ Erro ao carregar perfil. Faça login novamente.\n\nCódigo: " + (error?.code || "desconhecido"));
        await firebase.auth().signOut();
        window.location.href = "login.html";
      }
    });
  </script>
</head>
<body class="page-redirect">
  <main class="redirect-main">
    <h2>Carregando...</h2>
  </main>

  <footer class="footer-version">
    Paistorista • 2025 • <strong data-app-version></strong>
  </footer>
</body>
</html>
